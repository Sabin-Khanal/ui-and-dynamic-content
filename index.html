<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Buy Groceries</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <div class="widget">

    <!-- ── Masthead ── -->
    <header class="masthead">
      <img class="masthead-icon" src="img/basket.png" alt="Shopping basket" />

      <h1>
        <span>Buy</span>
        Groceries
      </h1>
      <p class="tagline">What do you need to buy today?</p>
    </header>

    <!-- ── Main Content ── -->
    <main class="main-content">
      <div class="input-row">
        <!-- text-input -->
        <input
          type="text"
          id="item-input"
          class="item-input"
          placeholder="your item here …"
          aria-label="Shopping item"
        />
        <!-- add-item button -->
        <button id="add-btn" class="add-btn">Add to List</button>
      </div>

      <!-- feedback paragraph -->
      <p class="feedback" role="alert" aria-live="polite"></p>

      <!-- unordered list for items -->
      <ul id="shopping-list" class="shopping-list"></ul>
    </main>

    <!-- ── Footer ── -->
    <footer class="widget-footer">

      <!-- Twitter / X -->
      <a href="#" class="social-link" aria-label="Twitter">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.746l7.73-8.835L2.25 2.25h6.929l4.259 5.631zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </a>

      <!-- LinkedIn -->
      <a href="#" class="social-link" aria-label="LinkedIn">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 01-2.063-2.065 2.064 2.064 0 112.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>
        </svg>
      </a>

      <!-- Facebook -->
      <a href="#" class="social-link" aria-label="Facebook">
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/>
        </svg>
      </a>

    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
